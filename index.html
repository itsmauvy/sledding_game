<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sledding Game</title>
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
        }

        body {
            display: grid;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            place-items: center;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .loader {
            display: grid;
            justify-items: center;
            gap: 18px;
        }

        .loading-gif {
            width: clamp(96px, 22vw, 180px);
            height: auto;
        }

        .loading {
            font-size: clamp(28px, 7vw, 68px);
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            font-weight: normal;
            letter-spacing: 0;
        }

        .dots {
            display: inline-block;
            margin-left: 0.12em;
        }

        .dots span {
            display: inline-block;
            animation: dot-bounce 1.1s ease-in-out infinite;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes dot-bounce {
            0%,
            80%,
            100% {
                opacity: 0.35;
                transform: translateY(0);
            }

            40% {
                opacity: 1;
                transform: translateY(-0.18em);
            }
        }
    </style>
</head>
<body>
    <main class="loader" aria-label="게임 로딩 중">
        <img class="loading-gif" src="images/loadinggif.gif" alt="">
        <div class="loading">loading<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    </main>
</body>
</html>
