<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>썰매 게임</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="loader-screen" aria-label="게임 로딩 중">
        <div class="loader">
            <img class="loading-gif" src="images/loadinggif.gif" alt="">
            <div class="loading">loading<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
        </div>
    </main>

    <header class="site-header">
        <img class="header-logo" src="images/logo_whitestroke.png" alt="썰매 게임">
        <nav class="nav" aria-label="주요 메뉴">
            <a href="#intro">게임 소개</a>
            <a href="#characters">캐릭터</a>
            <a href="#media">미디어</a>
            <a href="#news">뉴스</a>
        </nav>
        <div class="header-actions" aria-label="상단 설정">
            <div class="language-picker">
                <button class="header-icon-button language-button" type="button" aria-label="언어 선택" aria-haspopup="true" aria-expanded="false">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="9"></circle>
                        <path d="M3 12h18"></path>
                        <path d="M12 3c2.4 2.5 3.6 5.5 3.6 9s-1.2 6.5-3.6 9"></path>
                        <path d="M12 3c-2.4 2.5-3.6 5.5-3.6 9s1.2 6.5 3.6 9"></path>
                    </svg>
                </button>
                <div class="language-menu" role="menu" aria-label="언어 선택">
                    <button class="language-option is-selected" type="button" role="menuitemradio" aria-checked="true" data-lang="ko">한국어</button>
                    <button class="language-option" type="button" role="menuitemradio" aria-checked="false" data-lang="en">English</button>
                    <button class="language-option" type="button" role="menuitemradio" aria-checked="false" data-lang="ja">日本語</button>
                </div>
            </div>
            <button class="header-icon-button music-button" type="button" aria-label="음악 켜기/끄기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 18V6l10-2v12"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="16" cy="16" r="3"></circle>
                    <path class="sound-off-slash" d="M4 4l16 16"></path>
                </svg>
            </button>
            <button class="play-link" type="button">플레이 하기</button>
        </div>
    </header>

    <section class="page-section video-section" id="trailer">
        <div class="trailer-wrap">
            <video class="hero-video" autoplay muted loop playsinline>
                <source src="Sledding Game - Official Early Access Release Date Trailer _ The Triple-i Initiative Showcase 2026.mp4" type="video/mp4">
            </video>
            <div class="video-poster" aria-hidden="true"></div>
        </div>
        <div class="hero-content">
            <p class="hero-kicker">같이 굴러야 더 재밌다</p>
            <h1 class="hero-title">친구들과 썰매 타고 놀자</h1>
            <p class="hero-copy">썰매 타고, 눈싸움하고, 부딪히며 노는<br>가장 유쾌한 겨울 놀이터</p>
            <button class="cta" type="button">플레이 하기</button>
        </div>
        <div class="track-band" aria-hidden="true"></div>
    </section>

    <section class="page-section intro-section" id="intro">
        <div class="intro-layout">
            <div class="intro-showcase" aria-label="게임 소개 영상">
                <video class="intro-video" autoplay muted loop playsinline>
                    <source src="20260516-0520-43.7799556.mp4" type="video/mp4">
                </video>
            </div>
            <div class="intro-content">
                <p class="intro-label">우당탕 눈길 레이스</p>
                <h2 class="section-title">게임 소개</h2>
                <p class="intro-copy">친구들과 썰매에 올라 눈길을 달려보세요. 방향을 틀고, 점프하고, 서로 부딪히며 끝까지 굴러가는 유쾌한 겨울 레이스가 기다립니다.</p>
            </div>
        </div>
        <button class="intro-arrow intro-prev" type="button" aria-label="이전 소개">‹</button>
        <button class="intro-arrow intro-next" type="button" aria-label="다음 소개">›</button>
        <div class="intro-dots" aria-label="소개 선택">
            <button class="intro-dot is-active" type="button" aria-label="첫 번째 소개" aria-pressed="true"></button>
            <button class="intro-dot" type="button" aria-label="두 번째 소개" aria-pressed="false"></button>
            <button class="intro-dot" type="button" aria-label="세 번째 소개" aria-pressed="false"></button>
        </div>
    </section>

    <section class="page-section character-section" id="characters">
        <h2 class="section-title character-section-title">캐릭터 소개</h2>
        <div class="character-layout">
            <div class="character-stage" aria-live="polite">
                <div class="character-preview">
                    <span class="character-face frog" aria-hidden="true"><span></span></span>
                </div>
            </div>
            <div class="character-roster">
                <p class="character-name">개구리</p>
                <p class="character-tag">기본 썰매 친구</p>
                <p class="character-copy">좋아하는 친구를 골라 눈길을 내려가세요. 각 캐릭터는 같은 코스를 조금 다른 표정으로 미끄러집니다.</p>
            </div>
        </div>
        <div class="character-carousel" aria-label="캐릭터 선택 캐러셀">
            <button class="character-carousel-button prev" type="button" aria-label="이전 캐릭터"></button>
                <div class="character-grid" aria-label="캐릭터 선택">
                    <button class="character-tile is-selected" type="button" aria-label="초록 개구리 선택" data-name="초록 개구리" data-tag="처음 만나는 썰매 친구" data-face="frog" data-large="images/frpg 1.png"><span class="character-face frog" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="꼬마 펭귄 선택" data-name="꼬마 펭귄" data-tag="빙판 위 균형왕" data-face="penguin" data-large="images/penguin 1.png"><span class="character-face penguin" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="동글 물범 선택" data-name="동글 물범" data-tag="둥글둥글 스피드" data-face="seal" data-large="images/light seal 1.png"><span class="character-face seal" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="초코 수달 선택" data-name="초코 수달" data-tag="장난꾸러기 레이서" data-face="otter" data-large="images/bear 1.png"><span class="character-face otter" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="눈곰 선택" data-name="눈곰" data-tag="묵직한 눈길 돌파" data-face="bear" data-large="images/polar bear 1.png"><span class="character-face bear" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="밤곰 선택" data-name="밤곰" data-tag="밤눈길 질주자" data-face="blackbear" data-large="images/blackbear.png"><span class="character-face blackbear" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="점박 물범 선택" data-name="점박 물범" data-tag="차분한 코너링" data-face="seal" data-large="images/ringed seal 1.png"><span class="character-face seal" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="까만 물범 선택" data-name="까만 물범" data-tag="느긋한 미끄럼" data-face="blackbear" data-large="images/dark seal 1.png"><span class="character-face blackbear" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="주황 개구리 선택" data-name="주황 개구리" data-tag="통통 튀는 스타트" data-face="orange" data-large="images/orange frog 1.png"><span class="character-face orange" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="나무 개구리 선택" data-name="나무 개구리" data-tag="깡충깡충 점프" data-face="lime" data-large="images/tree frog 1.png"><span class="character-face lime" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="노란 두꺼비 선택" data-name="노란 두꺼비" data-tag="묵직한 응원단" data-face="duck" data-large="images/orange toad 1.png"><span class="character-face duck" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="밤두꺼비 선택" data-name="밤두꺼비" data-tag="짧고 단단한 질주" data-face="dog" data-large="images/dark toad 1.png"><span class="character-face dog" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="붉은 여우 선택" data-name="붉은 여우" data-tag="가벼운 코너 탈출" data-face="fox" data-large="images/fox 1.png"><span class="character-face fox" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="눈여우 선택" data-name="눈여우" data-tag="가장 높은 점프" data-face="rabbit" data-large="images/arctic fox 1.png"><span class="character-face rabbit" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="느긋 판다 선택" data-name="느긋 판다" data-tag="느긋하지만 단단하게" data-face="panda" data-large="images/panda 1.png"><span class="character-face panda" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="금빛 개구리 선택" data-name="금빛 개구리" data-tag="햇살 같은 응원단" data-face="yellow" data-large="images/gold frog 1.png"><span class="character-face yellow" aria-hidden="true"><span></span></span></button>
                </div>
            <button class="character-carousel-button next" type="button" aria-label="다음 캐릭터"></button>
        </div>
        <div class="track-band" aria-hidden="true"></div>
    </section>

    <section class="page-section media-section" id="media">
        <h2 class="section-title">미디어</h2>
        <div class="track-band reverse" aria-hidden="true"></div>
    </section>

    <section class="page-section news-section" id="news">
        <h2 class="section-title">뉴스</h2>
    </section>

    <img class="scroll-frog" src="images/frog3.png" alt="">
    <audio class="soundtrack-audio" src="Sledding Game_ Alfalfa - Original Soundtrack.mp3" preload="auto" loop></audio>

    <script src="script.js?v=intro-slides"></script>
</body>
</html>
