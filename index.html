<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>썰매 게임</title>
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --ink: #113143;
            --green: #2f4732;
            --snow: #f8fdff;
            --ice: #dff4ff;
            --track: #b8e2fb;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overflow-x: hidden;
            background: #fff;
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
        }

        .loader-screen {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            background: #000;
            color: #fff;
            transition: opacity 0.45s ease, visibility 0.45s ease;
        }

        body.is-ready .loader-screen {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader {
            display: grid;
            justify-items: center;
            gap: 18px;
        }

        .loading-gif {
            width: clamp(96px, 22vw, 180px);
            height: auto;
        }

        .loading {
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            font-size: clamp(28px, 7vw, 68px);
            font-weight: normal;
            letter-spacing: 0;
        }

        .dots {
            display: inline-block;
            margin-left: 0.12em;
        }

        .dots span {
            display: inline-block;
            animation: dot-bounce 1.1s ease-in-out infinite;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 20;
            isolation: isolate;
            display: grid;
            width: 100%;
            min-height: 64px;
            grid-template-columns: 158px 1fr auto;
            align-items: center;
            gap: 24px;
            padding: 10px 24px;
            color: #fff;
            mix-blend-mode: normal;
            filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.32));
        }

        .site-header::before {
            position: absolute;
            inset: 0;
            z-index: -1;
            content: "";
            border-bottom: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 0;
            background: rgba(13, 39, 45, 0.42);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 10px 28px rgba(13, 39, 45, 0.18);
            backdrop-filter: blur(10px);
        }

        .header-logo {
            width: 126px;
            height: auto;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(24px, 7vw, 90px);
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            font-size: clamp(20px, 1.8vw, 28px);
            font-weight: 800;
        }

        .nav a {
            position: relative;
            display: inline-flex;
            min-height: 36px;
            align-items: center;
            color: inherit;
            text-decoration: none;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.48);
            transition: color 0.18s ease, transform 0.18s ease;
        }

        .nav a::after {
            position: absolute;
            top: 32px;
            left: 50%;
            width: 34px;
            height: 34px;
            content: "";
            background: url("images/frog1.png") center / contain no-repeat;
            opacity: 0;
            transform: translate(-50%, -8px) scale(0.7) rotate(-7deg);
            transition: opacity 0.18s ease, transform 0.18s ease;
            pointer-events: none;
        }

        .nav a:hover,
        .nav a:focus-visible {
            color: #dffaff;
            outline: 0;
            transform: translateY(-2px);
        }

        .nav a:hover::after,
        .nav a:focus-visible::after {
            opacity: 1;
            transform: translate(-50%, 0) scale(1) rotate(-7deg);
        }

        .play-link,
        .cta {
            position: relative;
            border: 3px solid #203723;
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.24) 0 24%, transparent 25%),
                linear-gradient(135deg, #3f6845 0%, #2f4732 56%, #193024 100%);
            color: #f8fdff;
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            cursor: pointer;
            box-shadow: 0 6px 0 #14291e, 0 14px 24px rgba(23, 48, 68, 0.24);
            text-shadow: 0 2px 0 rgba(0, 0, 0, 0.24);
            transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
        }

        .header-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        .language-picker {
            position: relative;
        }

        .play-link {
            justify-self: end;
            min-width: 190px;
            min-height: 44px;
            padding: 7px 62px 9px 28px;
            font-size: 23px;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            border-color: #2f4732;
            border-radius: 999px;
            background:
                radial-gradient(circle at 82% 42%, rgba(223, 250, 255, 0.88) 0 12px, transparent 13px),
                linear-gradient(180deg, #ffffff 0%, #f8fdff 48%, #dff4ff 100%);
            color: #203723;
            box-shadow:
                inset 0 3px 0 rgba(255, 255, 255, 0.95),
                0 5px 0 #9fd2eb,
                0 12px 20px rgba(55, 127, 165, 0.2);
            text-shadow: none;
        }

        .play-link::before {
            position: absolute;
            right: 18px;
            bottom: -3px;
            width: 34px;
            height: 34px;
            content: "";
            background: url("images/frog1.png") center / contain no-repeat;
            transform: rotate(-8deg);
            transition: transform 0.18s ease;
            pointer-events: none;
        }

        .header-icon-button {
            position: relative;
            display: inline-grid;
            width: 46px;
            height: 44px;
            place-items: center;
            border: 3px solid #2f4732;
            border-radius: 999px;
            background:
                radial-gradient(circle at 70% 28%, rgba(223, 250, 255, 0.9) 0 9px, transparent 10px),
                linear-gradient(180deg, #ffffff 0%, #f8fdff 48%, #dff4ff 100%);
            color: #203723;
            cursor: pointer;
            box-shadow:
                inset 0 3px 0 rgba(255, 255, 255, 0.95),
                0 5px 0 #9fd2eb,
                0 12px 20px rgba(55, 127, 165, 0.18);
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .header-icon-button svg {
            width: 23px;
            height: 23px;
            stroke: currentColor;
            stroke-width: 2.6;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .header-icon-button:hover,
        .header-icon-button:focus-visible {
            outline: 0;
            transform: translateY(3px);
            box-shadow:
                inset 0 3px 0 rgba(255, 255, 255, 0.95),
                0 2px 0 #9fd2eb,
                0 7px 12px rgba(55, 127, 165, 0.16);
        }

        .header-icon-button.is-active {
            background:
                radial-gradient(circle at 70% 28%, rgba(223, 250, 255, 0.92) 0 9px, transparent 10px),
                linear-gradient(180deg, #dffaff 0%, #f8fdff 48%, #b8e2fb 100%);
            color: #173044;
        }

        .language-picker:hover .header-icon-button,
        .language-picker:focus-within .header-icon-button {
            transform: translateY(3px);
            box-shadow:
                inset 0 3px 0 rgba(255, 255, 255, 0.95),
                0 2px 0 #9fd2eb,
                0 7px 12px rgba(55, 127, 165, 0.16);
        }

        .language-menu {
            position: absolute;
            top: calc(100% + 12px);
            right: 0;
            z-index: 25;
            display: grid;
            min-width: 132px;
            padding: 8px;
            border: 3px solid #2f4732;
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(223, 244, 255, 0.96));
            box-shadow:
                inset 0 2px 0 rgba(255, 255, 255, 0.95),
                0 6px 0 #9fd2eb,
                0 16px 24px rgba(13, 39, 45, 0.24);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px) scale(0.96);
            transform-origin: top right;
            transition: opacity 0.16s ease, transform 0.16s ease, visibility 0.16s ease;
        }

        .language-picker:hover .language-menu,
        .language-picker:focus-within .language-menu,
        .language-picker.is-open .language-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .language-menu::before {
            position: absolute;
            top: -10px;
            right: 18px;
            width: 16px;
            height: 16px;
            content: "";
            border-top: 3px solid #2f4732;
            border-left: 3px solid #2f4732;
            background: rgba(255, 255, 255, 0.96);
            transform: rotate(45deg);
        }

        .language-option {
            position: relative;
            display: flex;
            min-height: 38px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 11px;
            border: 0;
            border-radius: 12px;
            background: transparent;
            color: #203723;
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            font-size: 19px;
            line-height: 1;
            text-align: left;
            cursor: pointer;
            transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
        }

        .language-option:hover,
        .language-option:focus-visible {
            outline: 0;
            background: #2f4732;
            color: #f8fdff;
            transform: translateX(-2px);
        }

        .language-option.is-selected {
            background: rgba(184, 226, 251, 0.74);
        }

        .language-option.is-selected:hover,
        .language-option.is-selected:focus-visible {
            background: #2f4732;
            color: #f8fdff;
        }

        .language-option.is-selected::after {
            content: "✓";
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            font-weight: 800;
        }

        .language-option.is-selected:hover::after,
        .language-option.is-selected:focus-visible::after {
            color: inherit;
        }

        .sound-off-slash {
            opacity: 1;
            transition: opacity 0.14s ease;
        }

        .header-icon-button.is-active .sound-off-slash {
            opacity: 0;
        }

        .play-link:hover,
        .play-link:focus-visible,
        .cta:hover,
        .cta:focus-visible {
            outline: 0;
            filter: saturate(1.08);
            transform: translateY(3px);
            box-shadow: 0 3px 0 #14291e, 0 8px 12px rgba(23, 48, 68, 0.18);
        }

        .play-link:hover,
        .play-link:focus-visible {
            color: #203723;
            filter: none;
            box-shadow:
                inset 0 3px 0 rgba(255, 255, 255, 0.95),
                0 2px 0 #9fd2eb,
                0 7px 12px rgba(55, 127, 165, 0.18);
        }

        .play-link:hover::before,
        .play-link:focus-visible::before {
            transform: translateY(-3px) rotate(5deg);
        }

        .page-section {
            position: relative;
            display: grid;
            min-height: 68vh;
            place-items: center;
            padding: 92px 24px 140px;
            overflow: hidden;
            background: #fff;
        }

        .section-title {
            position: relative;
            z-index: 4;
            margin: 0;
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            font-size: clamp(52px, 8vw, 104px);
            font-weight: normal;
            letter-spacing: 0;
            text-align: center;
        }

        .video-section {
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            place-items: center;
            gap: 0;
            padding: 0 24px;
            overflow: visible;
        }

        .video-section .section-title {
            display: none;
        }

        .video-section::after {
            position: absolute;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 4;
            height: clamp(150px, 19vh, 260px);
            content: "";
            background:
                linear-gradient(174deg, transparent 0 28%, rgba(246, 252, 255, 0.72) 29% 36%, #fff 37% 58%, rgba(255, 255, 255, 0) 100%),
                linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.72) 52%, rgba(255, 255, 255, 0) 100%);
            clip-path: polygon(0 68%, 100% 52%, 100% 100%, 0 100%);
            pointer-events: none;
        }

        .trailer-wrap {
            position: absolute;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            aspect-ratio: auto;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.45s ease, transform 0.45s ease;
        }

        .hero-content {
            position: relative;
            z-index: 4;
            display: grid;
            justify-items: center;
            width: min(920px, 90vw);
            margin: 0 auto;
            transform: translateY(clamp(-120px, -9vh, -72px));
            color: #f8fdff;
            text-align: center;
            text-shadow: 0 4px 18px rgba(7, 25, 32, 0.54);
        }

        .hero-kicker {
            margin: 0 0 8px;
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            font-size: clamp(24px, 2.6vw, 38px);
            letter-spacing: 0;
        }

        .hero-title {
            margin: 0;
            font-family: 'OngleipParkDahyeon', "Comic Sans MS", cursive;
            font-size: clamp(56px, 8vw, 116px);
            font-weight: normal;
            line-height: 0.9;
            letter-spacing: 0;
        }

        .hero-copy {
            width: min(680px, 88vw);
            margin: 20px 0 0;
            font-size: clamp(17px, 1.7vw, 24px);
            font-weight: 800;
            line-height: 1.45;
        }

        .hero-content .cta {
            margin-top: 30px;
        }

        body.has-video .trailer-wrap {
            opacity: 1;
        }

        .hero-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: brightness(0.72) saturate(0.96) contrast(1.05);
        }

        .video-poster {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #fff, #eefaff);
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        body.has-video .video-poster {
            opacity: 0;
        }

        .track-band {
            position: absolute;
            right: -22vw;
            bottom: -3vh;
            left: -22vw;
            z-index: 3;
            height: clamp(150px, 23vh, 270px);
            overflow: hidden;
            border-radius: 48% 52% 42% 58% / 38% 42% 30% 32%;
            background:
                radial-gradient(circle at 14% 30%, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
                radial-gradient(circle at 22% 36%, rgba(255, 255, 255, 0.75) 0 3px, transparent 4px),
                radial-gradient(circle at 80% 38%, rgba(255, 255, 255, 0.82) 0 2px, transparent 3px),
                linear-gradient(170deg, transparent 0 38%, rgba(126, 194, 235, 0.18) 39% 47%, transparent 48%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, #f9fdff 56%, #dff4ff 100%);
            box-shadow:
                inset 0 10px 0 rgba(255, 255, 255, 0.9),
                inset 0 -24px 36px rgba(134, 203, 238, 0.16),
                0 -10px 30px rgba(129, 198, 234, 0.16);
            transform: rotate(-8deg) translateY(16%);
            transform-origin: 50% 50%;
        }

        .track-band.reverse {
            transform: rotate(8deg) translateY(16%);
        }

        .video-section .track-band {
            right: -32vw;
            bottom: -7vh;
            left: -32vw;
            z-index: 3;
            height: clamp(210px, 28vh, 360px);
            border-radius: 48% 52% 28% 30% / 30% 34% 18% 20%;
            background:
                radial-gradient(circle at 14% 22%, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
                radial-gradient(circle at 22% 30%, rgba(255, 255, 255, 0.75) 0 3px, transparent 4px),
                radial-gradient(circle at 78% 32%, rgba(255, 255, 255, 0.82) 0 2px, transparent 3px),
                linear-gradient(170deg, transparent 0 30%, rgba(126, 194, 235, 0.15) 31% 39%, transparent 40%),
                linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, #fbfeff 52%, #edf9ff 100%);
            transform: rotate(-6.5deg) translateY(18%);
        }

        .track-band::before {
            position: absolute;
            inset: 24% 7% auto;
            height: 11px;
            content: "";
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.95), transparent);
            box-shadow: 0 25px 0 rgba(255, 255, 255, 0.42), 0 48px 0 rgba(209, 238, 255, 0.3);
            transform: rotate(-2deg);
        }

        .track-band::after {
            position: absolute;
            left: 7%;
            bottom: 28%;
            width: 88%;
            height: 42px;
            content: "";
            border-radius: 999px;
            background:
                radial-gradient(ellipse at 7% 60%, rgba(95, 151, 160, 0.28) 0 5px, transparent 6px),
                radial-gradient(ellipse at 9% 42%, rgba(95, 151, 160, 0.2) 0 4px, transparent 5px),
                radial-gradient(ellipse at 78% 54%, rgba(95, 151, 160, 0.22) 0 5px, transparent 6px),
                linear-gradient(90deg, transparent, rgba(99, 176, 228, 0.18), transparent);
            filter: blur(0.3px);
        }

        .scroll-frog {
            position: fixed;
            z-index: 3;
            left: var(--frog-x, 14vw);
            top: var(--frog-y, 58vh);
            width: clamp(128px, 19vw, 230px);
            height: auto;
            opacity: var(--frog-opacity, 0);
            filter: drop-shadow(0 16px 16px rgba(63, 128, 164, 0.18));
            transform: translate(-50%, -50%) rotate(var(--frog-rotate, -10deg));
            transition: opacity 0.18s ease, filter 0.18s ease;
            pointer-events: none;
        }

        .intro-section,
        .character-section,
        .media-section {
            min-height: 66vh;
        }

        .intro-section {
            z-index: auto;
            min-height: 86vh;
            margin-top: -1px;
            padding: clamp(150px, 17vh, 210px) 24px 132px;
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.74) 0 3px, transparent 4px),
                radial-gradient(circle at 31% 38%, rgba(255, 255, 255, 0.48) 0 4px, transparent 5px),
                radial-gradient(circle at 72% 19%, rgba(255, 255, 255, 0.66) 0 3px, transparent 4px),
                radial-gradient(circle at 88% 64%, rgba(255, 255, 255, 0.52) 0 5px, transparent 6px),
                linear-gradient(180deg, #ffffff 0%, #f4fcff 13%, #ccefff 28%, #8addff 52%, #dff4ff 78%, #ffffff 100%);
            color: #fff;
        }

        .intro-section::before {
            position: absolute;
            inset: 80px 0 0;
            content: "";
            opacity: 0.48;
            background:
                radial-gradient(circle at 8% 18%, rgba(255, 255, 255, 0.72) 0 2px, transparent 3px),
                radial-gradient(circle at 18% 42%, rgba(255, 255, 255, 0.44) 0 3px, transparent 4px),
                radial-gradient(circle at 34% 12%, rgba(255, 255, 255, 0.58) 0 2px, transparent 3px),
                radial-gradient(circle at 52% 72%, rgba(255, 255, 255, 0.42) 0 4px, transparent 5px),
                radial-gradient(circle at 76% 26%, rgba(255, 255, 255, 0.6) 0 2px, transparent 3px),
                radial-gradient(circle at 90% 58%, rgba(255, 255, 255, 0.48) 0 3px, transparent 4px),
                linear-gradient(162deg, transparent 0 34%, rgba(255, 255, 255, 0.22) 35% 36%, transparent 37% 100%);
            background-size: 360px 260px, 420px 320px, 460px 300px, 380px 280px, 430px 310px, 390px 270px, 520px 320px;
            pointer-events: none;
        }

        .intro-section::after {
            position: absolute;
            inset: auto 0 0;
            height: 130px;
            content: "";
            background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.95));
            pointer-events: none;
        }

        .intro-layout {
            position: relative;
            z-index: 6;
            display: grid;
            width: min(1560px, 88vw);
            grid-template-columns: minmax(280px, 0.52fr) minmax(520px, 1fr);
            align-items: center;
            gap: clamp(44px, 7vw, 112px);
        }

        .intro-showcase {
            position: relative;
            aspect-ratio: 16 / 9;
            min-height: 0;
            order: 2;
            border: 9px solid #f8fdff;
            border-radius: 18px;
            overflow: hidden;
            background: #b8e2fb;
            box-shadow:
                0 10px 0 #9fd2eb,
                0 26px 44px rgba(55, 127, 165, 0.24);
            transform: rotate(-4deg);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .intro-showcase::before {
            position: absolute;
            right: 16px;
            bottom: -7px;
            z-index: 3;
            width: clamp(66px, 9vw, 126px);
            height: clamp(58px, 8vw, 110px);
            content: "";
            background: url("images/frog1.png") center / contain no-repeat;
            filter: drop-shadow(0 10px 10px rgba(22, 70, 96, 0.2));
            transform: rotate(8deg);
            pointer-events: none;
        }

        .intro-showcase:hover {
            transform: rotate(-2.5deg) scale(1.015);
            box-shadow:
                0 12px 0 #9fd2eb,
                0 32px 54px rgba(55, 127, 165, 0.28);
        }

        .intro-video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(1.06) contrast(1.03);
        }

        .intro-arrow {
            position: absolute;
            top: 50%;
            z-index: 7;
            display: grid;
            width: 62px;
            height: 62px;
            place-items: center;
            border: 5px solid #f8fdff;
            border-radius: 999px;
            background: rgba(47, 71, 50, 0.72);
            color: #f8fdff;
            cursor: pointer;
            font-size: 0;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
            transform: translateY(-50%);
            box-shadow: 0 6px 0 rgba(159, 210, 235, 0.82);
            transition: background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
        }

        .intro-arrow::before {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 19px;
            height: 19px;
            content: "";
            border-top: 6px solid currentColor;
            border-right: 6px solid currentColor;
        }

        .intro-prev {
            left: clamp(12px, 2.4vw, 44px);
        }

        .intro-prev::before {
            transform: translate(-38%, -50%) rotate(-135deg);
        }

        .intro-next {

            height: 100%;

        .character-face::before,
        .character-face::after {

            top: 30%;
            width: 13%;
            height: 13%;
            content: "";
            border-radius: 50%;
            background: #102f27;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.28);

        .character-face::before {
            left: 26%;
        }

        .character-face::after {
            right: 26%;
        }

        .character-face span {
            position: absolute;
            right: 24%;
            bottom: 24%;
            left: 24%;
            height: 28%;

            left: 50%;

                <div class="character-grid" aria-label="캐릭터 선택">
                    <button class="character-tile is-selected" type="button" aria-label="개구리 선택" data-name="개구리" data-tag="기본 썰매 친구" data-face="frog"><span class="character-face frog" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="펭귄 선택" data-name="펭귄" data-tag="얼음길 균형왕" data-face="penguin"><span class="character-face penguin" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="물범 선택" data-name="물범" data-tag="둥글둥글 스피드" data-face="seal"><span class="character-face seal" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="수달 선택" data-name="수달" data-tag="장난꾸러기 레이서" data-face="otter"><span class="character-face otter" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="북극곰 선택" data-name="북극곰" data-tag="묵직한 눈길 돌파" data-face="bear"><span class="character-face bear" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="검은곰 선택" data-name="검은곰" data-tag="밤눈길 질주자" data-face="blackbear"><span class="character-face blackbear" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="회색 물범 선택" data-name="회색 물범" data-tag="차분한 코너링" data-face="seal"><span class="character-face seal" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="해달 선택" data-name="해달" data-tag="느긋한 미끄럼" data-face="blackbear"><span class="character-face blackbear" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="주황 개구리 선택" data-name="주황 개구리" data-tag="통통 튀는 스타트" data-face="orange"><span class="character-face orange" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="초록 개구리 선택" data-name="초록 개구리" data-tag="깡충깡충 점프" data-face="lime"><span class="character-face lime" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="오리 선택" data-name="오리" data-tag="노란 눈길 친구" data-face="duck"><span class="character-face duck" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="강아지 선택" data-name="강아지" data-tag="꼬리 흔드는 질주" data-face="dog"><span class="character-face dog" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="여우 선택" data-name="여우" data-tag="가벼운 코너 탈출" data-face="fox"><span class="character-face fox" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="토끼 선택" data-name="토끼" data-tag="가장 높은 점프" data-face="rabbit"><span class="character-face rabbit" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="판다 선택" data-name="판다" data-tag="느긋하지만 단단하게" data-face="panda"><span class="character-face panda" aria-hidden="true"><span></span></span></button>
                    <button class="character-tile" type="button" aria-label="노랑이 선택" data-name="노랑이" data-tag="햇살 같은 응원단" data-face="yellow"><span class="character-face yellow" aria-hidden="true"><span></span></span></button>
                </div>
            <button class="character-carousel-button next" type="button" aria-label="다음 캐릭터"></button>
        </div>
        <div class="track-band" aria-hidden="true"></div>
    </section>

    <section class="page-section media-section" id="media">
        <h2 class="section-title">미디어</h2>
        <div class="track-band reverse" aria-hidden="true"></div>
    </section>

    <section class="page-section news-section" id="news">
        <h2 class="section-title">뉴스</h2>
    </section>

    <img class="scroll-frog" src="images/frog3.png" alt="">
    <audio class="soundtrack-audio" src="Sledding Game_ Alfalfa - Original Soundtrack.mp3" preload="auto" loop></audio>

    <script>
        const body = document.body;
        const heroVideo = document.querySelector('.hero-video');
        const scrollFrog = document.querySelector('.scroll-frog');
        const soundtrackAudio = document.querySelector('.soundtrack-audio');
        const languagePicker = document.querySelector('.language-picker');
        const languageButton = document.querySelector('.language-button');
        const languageOptions = document.querySelectorAll('.language-option');
        const musicButton = document.querySelector('.music-button');
        const introDots = document.querySelectorAll('.intro-dot');
        const introPrev = document.querySelector('.intro-prev');
        const introNext = document.querySelector('.intro-next');
        const characterTiles = document.querySelectorAll('.character-tile');
        const characterPrev = document.querySelector('.character-carousel-button.prev');
        const characterNext = document.querySelector('.character-carousel-button.next');
        const characterPreviewFace = document.querySelector('.character-preview .character-face');
        const characterName = document.querySelector('.character-name');
        const characterTag = document.querySelector('.character-tag');
        let currentCharacterIndex = 0;
        const translations = {
            ko: {
                htmlLang: 'ko',
                title: '썰매 게임',
                logoAlt: '썰매 게임',
                navLabel: '주요 메뉴',
                settingsLabel: '상단 설정',
                languageLabel: '언어 선택',
                musicOn: '음악 켜기',
                musicOff: '음악 끄기',
                loadingLabel: '게임 로딩 중',
                nav: ['게임 소개', '캐릭터', '미디어', '뉴스'],
                play: '플레이 하기',
                kicker: '같이 굴러야 더 재밌다',
                heroTitle: '친구들과 썰매 타고 놀자',
                heroCopy: '썰매 타고, 눈싸움하고, 부딪히며 노는<br>가장 유쾌한 겨울 놀이터',
                introVideoLabel: '게임 소개 영상',
                introDotsLabel: '소개 선택',
                prevIntro: '이전 소개',
                nextIntro: '다음 소개',
                introDotLabels: ['첫 번째 소개', '두 번째 소개', '세 번째 소개'],
                introLabel: '미끄러지는 겨울 놀이터',
                introTitle: '게임 소개',
                introCopy: '작은 개구리들이 썰매를 타고 눈길을 가릅니다. 점프하고, 부딪히고, 마지막 언덕까지 미끄러지며 친구들과 가장 유쾌한 겨울 레이스를 즐겨보세요.',
                characters: '캐릭터',
                characterCopy: '좋아하는 친구를 골라 눈길을 내려가세요. 각 캐릭터는 같은 코스를 조금 다른 표정으로 미끄러집니다.',
                characterGridLabel: '캐릭터 선택',
                media: '미디어',
                news: '뉴스'
            },
            en: {
                htmlLang: 'en',
                title: 'Sledding Game',
                logoAlt: 'Sledding Game',
                navLabel: 'Main menu',
                settingsLabel: 'Header settings',
                languageLabel: 'Choose language',
                musicOn: 'Turn music on',
                musicOff: 'Turn music off',
                loadingLabel: 'Game loading',
                nav: ['About', 'Characters', 'Media', 'News'],
                play: 'Play Now',
                kicker: 'Rolling together is better',
                heroTitle: 'Go Sledding With Friends',
                heroCopy: 'Sled, throw snowballs, bump around,<br>and enjoy the happiest winter playground',
                introVideoLabel: 'About video',
                introDotsLabel: 'Choose intro',
                prevIntro: 'Previous intro',
                nextIntro: 'Next intro',
                introDotLabels: ['First intro', 'Second intro', 'Third intro'],
                introLabel: 'A Slippery Winter Playground',
                introTitle: 'About',
                introCopy: 'Tiny frogs carve through snowy tracks on bright blue sleds. Jump, bump, slide, and race with friends all the way down the happiest winter hill.',
                characters: 'Characters',
                characterCopy: 'Pick your favorite buddy and slide down the snow. Every character brings a different mood to the same wild course.',
                characterGridLabel: 'Choose character',
                media: 'Media',
                news: 'News'
            },
            ja: {
                htmlLang: 'ja',
                title: 'そりすべりゲーム',
                logoAlt: 'そりすべりゲーム',
                navLabel: 'メインメニュー',
                settingsLabel: 'ヘッダー設定',
                languageLabel: '言語を選択',
                musicOn: '音楽をオン',
                musicOff: '音楽をオフ',
                loadingLabel: 'ゲームを読み込み中',
                nav: ['ゲーム紹介', 'キャラクター', 'メディア', 'ニュース'],
                play: 'プレイする',
                kicker: '一緒に転がるほど楽しい',
                heroTitle: '友だちとそりで遊ぼう',
                heroCopy: 'そりに乗って、雪玉を投げて、ぶつかって遊ぶ<br>最高に楽しい冬の遊び場',
                introVideoLabel: 'ゲーム紹介映像',
                introDotsLabel: '紹介を選択',
                prevIntro: '前の紹介',
                nextIntro: '次の紹介',
                introDotLabels: ['1つ目の紹介', '2つ目の紹介', '3つ目の紹介'],
                introLabel: 'すべって遊ぶ冬の遊び場',
                introTitle: 'ゲーム紹介',
                introCopy: '小さなカエルたちが青いそりで雪道を滑ります。ジャンプして、ぶつかって、友だちと一緒に楽しい冬の坂を最後まで走り抜けましょう。',
                characters: 'キャラクター',
                characterCopy: '好きな仲間を選んで雪道を滑りましょう。どのキャラクターも同じコースを少し違う表情で走ります。',
                characterGridLabel: 'キャラクターを選択',
                media: 'メディア',
                news: 'ニュース'
            }
        };
        const frogRuns = [
            { section: document.querySelector('.video-section'), fromRight: true },
            { section: document.querySelector('.intro-section'), fromRight: false, lowRoad: true },
            { section: document.querySelector('.character-section'), fromRight: true },
            { section: document.querySelector('.media-section'), fromRight: false }
        ];

        window.setTimeout(() => {
            body.classList.add('is-ready');
        }, 1500);

        heroVideo.addEventListener('canplay', () => {
            body.classList.add('has-video');
        });

        soundtrackAudio.volume = 0.42;
        musicButton.setAttribute('aria-pressed', 'false');
        musicButton.setAttribute('aria-label', '음악 켜기');

        function setLanguage(lang) {
            const copy = translations[lang] || translations.ko;
            const navLinks = document.querySelectorAll('.nav a');
            const ctaButtons = document.querySelectorAll('.play-link, .cta');
            const characterTitle = document.querySelector('.character-section .section-title');
            const characterCopy = document.querySelector('.character-copy');
            const characterGrid = document.querySelector('.character-grid');
            const mediaTitle = document.querySelector('.media-section .section-title');
            const newsTitle = document.querySelector('.news-section .section-title');
            const introTitle = document.querySelector('.intro-section .section-title');
            const introLabel = document.querySelector('.intro-label');
            const introCopy = document.querySelector('.intro-copy');
            const introShowcase = document.querySelector('.intro-showcase');
            const introDotsWrap = document.querySelector('.intro-dots');

            document.documentElement.lang = copy.htmlLang;
            document.title = copy.title;
            document.querySelector('.loader-screen').setAttribute('aria-label', copy.loadingLabel);
            document.querySelector('.header-logo').setAttribute('alt', copy.logoAlt);
            document.querySelector('.nav').setAttribute('aria-label', copy.navLabel);
            document.querySelector('.header-actions').setAttribute('aria-label', copy.settingsLabel);
            languageButton.setAttribute('aria-label', copy.languageLabel);
            languageOptions.forEach((option) => {
                const selected = option.dataset.lang === lang;
                option.classList.toggle('is-selected', selected);
                option.setAttribute('aria-checked', String(selected));
            });

            navLinks.forEach((link, index) => {
                link.textContent = copy.nav[index];
            });

            ctaButtons.forEach((button) => {
                button.textContent = copy.play;
            });

            document.querySelector('.hero-kicker').textContent = copy.kicker;
            document.querySelector('.hero-title').textContent = copy.heroTitle;
            document.querySelector('.hero-copy').innerHTML = copy.heroCopy;
            introShowcase.setAttribute('aria-label', copy.introVideoLabel);
            introDotsWrap.setAttribute('aria-label', copy.introDotsLabel);
            introPrev.setAttribute('aria-label', copy.prevIntro);
            introNext.setAttribute('aria-label', copy.nextIntro);
            introDots.forEach((dot, index) => {
                dot.setAttribute('aria-label', copy.introDotLabels[index]);
            });
            if (introLabel) {
                introLabel.textContent = copy.introLabel;
            }
            if (introTitle) {
                introTitle.textContent = copy.introTitle;
            }
            if (introCopy) {
                introCopy.textContent = copy.introCopy;
            }
            characterTitle.textContent = copy.characters;
            characterCopy.textContent = copy.characterCopy;
            characterGrid.setAttribute('aria-label', copy.characterGridLabel);
            mediaTitle.textContent = copy.media;
            newsTitle.textContent = copy.news;
            musicButton.setAttribute('aria-label', soundtrackAudio.paused ? copy.musicOn : copy.musicOff);
        }

        function updateCharacterWindow(index) {
            const visibleCount = window.matchMedia('(max-width: 760px)').matches ? 3 : 5;
            const maxStart = Math.max(characterTiles.length - visibleCount, 0);
            const start = clamp(index - Math.floor(visibleCount / 2), 0, maxStart);
            const end = start + visibleCount;

            characterTiles.forEach((tile, tileIndex) => {
                tile.classList.toggle('is-window-hidden', tileIndex < start || tileIndex >= end);
            });
        }

        function selectCharacter(index) {
            currentCharacterIndex = (index + characterTiles.length) % characterTiles.length;
            const tile = characterTiles[currentCharacterIndex];

            characterTiles.forEach((item) => item.classList.remove('is-selected'));
            tile.classList.add('is-selected');
            characterPreviewFace.className = `character-face ${tile.dataset.face}`;
            characterPreviewFace.innerHTML = '<span></span>';
            characterName.textContent = tile.dataset.name;
            characterTag.textContent = tile.dataset.tag;
            updateCharacterWindow(currentCharacterIndex);
        }

        characterTiles.forEach((tile, index) => {
            tile.addEventListener('click', () => {
                selectCharacter(index);
            });
        });

        characterPrev.addEventListener('click', () => {
            selectCharacter(currentCharacterIndex - 1);
        });

        characterNext.addEventListener('click', () => {
            selectCharacter(currentCharacterIndex + 1);
        });

        updateCharacterWindow(currentCharacterIndex);

        function setIntroDot(index) {
            introDots.forEach((item, itemIndex) => {
                const selected = itemIndex === index;
                item.classList.toggle('is-active', selected);
                item.setAttribute('aria-pressed', String(selected));
            });
        }

        introDots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                setIntroDot(index);
            });
        });

        introPrev.addEventListener('click', () => {
            const activeIndex = Array.from(introDots).findIndex((dot) => dot.classList.contains('is-active'));
            setIntroDot((activeIndex - 1 + introDots.length) % introDots.length);
        });

        introNext.addEventListener('click', () => {
            const activeIndex = Array.from(introDots).findIndex((dot) => dot.classList.contains('is-active'));
            setIntroDot((activeIndex + 1) % introDots.length);
        });

        introDots.forEach((dot, index) => {
            dot.addEventListener('mouseenter', () => {
                setIntroDot(index);
            });
        });

        languageButton.addEventListener('click', () => {
            const isOpen = languagePicker.classList.toggle('is-open');
            languageButton.setAttribute('aria-expanded', String(isOpen));
        });

        languageOptions.forEach((option) => {
            option.addEventListener('click', () => {
                setLanguage(option.dataset.lang);
                languagePicker.classList.remove('is-open');
                languageButton.setAttribute('aria-expanded', 'false');
                languageButton.focus();
            });
        });

        document.addEventListener('click', (event) => {
            if (!languagePicker.contains(event.target)) {
                languagePicker.classList.remove('is-open');
                languageButton.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                languagePicker.classList.remove('is-open');
                languageButton.setAttribute('aria-expanded', 'false');
                languageButton.focus();
            }
        });

        musicButton.addEventListener('click', async () => {
            if (soundtrackAudio.paused) {
                try {
                    await soundtrackAudio.play();
                    musicButton.classList.add('is-active');
                    musicButton.setAttribute('aria-pressed', 'true');
                    musicButton.setAttribute('aria-label', translations[document.documentElement.lang]?.musicOff || translations.ko.musicOff);
                } catch (error) {
                    musicButton.classList.remove('is-active');
                    musicButton.setAttribute('aria-pressed', 'false');
                }
                return;
            }

            soundtrackAudio.pause();
            musicButton.classList.remove('is-active');
            musicButton.setAttribute('aria-pressed', 'false');
            musicButton.setAttribute('aria-label', translations[document.documentElement.lang]?.musicOn || translations.ko.musicOn);
        });

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function smoothstep(value) {
            return value * value * (3 - 2 * value);
        }

        function updateScrollFrog() {
            let activeRun = null;
            let progress = 0;

            frogRuns.some((run) => {
                const trackY = run.section.offsetTop + run.section.offsetHeight;
                const start = trackY - window.innerHeight * 0.95;
                const end = trackY - window.innerHeight * 0.12;
                const runProgress = (window.scrollY - start) / (end - start);

                if (runProgress >= 0 && runProgress <= 1) {
                    activeRun = run;
                    progress = clamp(runProgress, 0, 1);
                    return true;
                }

                return false;
            });

            if (!activeRun) {
                scrollFrog.style.setProperty('--frog-opacity', 0);
                return;
            }

            const eased = smoothstep(progress);
            const fadeIn = clamp(progress / 0.18, 0, 1);
            const fadeOut = clamp((1 - progress) / 0.22, 0, 1);
            const visible = fadeIn * fadeOut;
            const wave = Math.sin(eased * Math.PI);
            const xStart = activeRun.fromRight ? 112 : -12;
            const xEnd = activeRun.fromRight ? -12 : 112;
            const x = xStart + (xEnd - xStart) * eased;
            const y = activeRun.lowRoad ? 88 + wave * 1.5 : 35 + eased * 35 + wave * 2.5;
            const rotate = activeRun.fromRight ? 12 + eased * 5 : -12 - eased * 5;

            scrollFrog.style.setProperty('--frog-opacity', visible);
            scrollFrog.style.setProperty('--frog-x', `${x.toFixed(2)}vw`);
            scrollFrog.style.setProperty('--frog-y', `${y.toFixed(2)}vh`);
            scrollFrog.style.setProperty('--frog-rotate', `${rotate.toFixed(2)}deg`);
        }

        updateScrollFrog();
        window.addEventListener('scroll', updateScrollFrog, { passive: true });
        window.addEventListener('resize', () => {
            updateScrollFrog();
            updateCharacterWindow(currentCharacterIndex);
        });
    </script>
</body>
</html>
